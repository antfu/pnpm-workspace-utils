cleanupUnusedCatalogs: true
catalogMode: prefer
trustPolicy: no-downgrade
ignoreWorkspaceRootCheck: true
shellEmulator: true

packages:
  - packages/*

catalogs:
  dev:
    '@antfu/eslint-config': ^7.6.0
    '@antfu/ni': ^28.2.0
    '@antfu/utils': ^9.3.0
    '@types/node': ^25.3.0
    '@typescript-eslint/parser': ^8.56.1
    '@typescript-eslint/utils': ^8.56.1
    '@typescript/native-preview': 7.0.0-dev.20260118.1
    bumpp: ^10.4.1
    eslint: ^10.0.2
    eslint-plugin-format: ^2.0.0
    eslint-vitest-rule-tester: ^3.1.0
    jiti: ^2.6.1
    lint-staged: ^16.2.7
    simple-git-hooks: ^2.13.1
    tsdown: 0.20.0-beta.3
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.3.1
  prod:
    empathic: ^2.0.0
    jsonc-eslint-parser: ^3.1.0
    pathe: ^2.0.3
    tinyglobby: ^0.2.15
    yaml: ^2.8.2
    yaml-eslint-parser: ^2.0.0
  test:
    tinyexec: ^1.0.2
    vitest: ^4.0.18
    vitest-package-exports: ^1.2.0

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
